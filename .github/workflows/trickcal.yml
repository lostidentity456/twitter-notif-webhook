name: Mochi FM 
on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser
      - run: python bot.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      - name: Save last_id
        run: |
          git config user.email "bot@bot.com"
          git config user.name "Bot"
          git add last_id.txt
          git diff --staged --quiet || git commit -m "update last_id"
          git push
